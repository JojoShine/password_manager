name: Build and Release Flutter App

# 添加权限声明
permissions:
  contents: read  # 允许读取代码仓库

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  FLUTTER_VERSION: '3.35.4'

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不保留凭证
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS app
        run: flutter build macos --release
      
      - name: Create DMG package
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "Password Manager" \
            -srcfolder "password_manager.app" \
            -ov -format UDZO password_manager.dmg
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-macos
          path: build/macos/Build/Products/Release/password_manager.dmg
          retention-days: 30

  build-windows:
    name: Build Windows App
    runs-on: windows-2022
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不保留凭证
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop
      
      - name: Clean Windows build cache
        run: if (Test-Path build) { Remove-Item -Recurse -Force build }
      
      - name: Patch Flutter Windows build generator
        shell: pwsh
        run: |
          # 获取Flutter SDK路径
          $flutterRoot = (flutter --version | Select-String "Flutter at (.+)" | ForEach-Object { $_.Matches.Groups[1].Value })
          if (-not $flutterRoot) {
            # 备用方案：从PATH推断
            $flutterBin = (Get-Command flutter).Source | Split-Path -Parent
            $flutterRoot = Split-Path $flutterBin -Parent
          }
          Write-Host "Flutter SDK path: $flutterRoot"
          
          # 查找并修补Windows构建文件中的VS 2019引用
          $dartFiles = Get-ChildItem -Path "$flutterRoot/packages/flutter_tools" -Recurse -Filter "*.dart" | Select-String -Pattern "Visual Studio 16 2019" -List | ForEach-Object { $_.Path }
          foreach ($file in $dartFiles) {
            Write-Host "Patching: $file"
            (Get-Content $file -Raw) -replace 'Visual Studio 16 2019', 'Visual Studio 17 2022' | Set-Content $file -NoNewline
          }
          
          if ($dartFiles.Count -eq 0) {
            Write-Host "No files found with VS 2019 reference, checking all Dart files..."
            Get-ChildItem -Path "$flutterRoot" -Recurse -Filter "*.dart" | Select-String -Pattern "Visual Studio 16" -List | ForEach-Object {
              Write-Host "Patching: $($_.Path)"
              (Get-Content $_.Path -Raw) -replace 'Visual Studio 16 2019', 'Visual Studio 17 2022' | Set-Content $_.Path -NoNewline
            }
          }
          
          Write-Host "Patch complete"
      
      - name: Build Windows app
        run: flutter build windows --release
      
      - name: Create ZIP package
        uses: vimtor/action-zip@v1
        with:
          files: build/windows/x64/runner/Release/
          dest: password_manager_windows.zip
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-windows
          path: password_manager_windows.zip
          retention-days: 30

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write  # 需要写入权限来创建 Release
    
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: password-manager-macos
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: password-manager-windows
      
      - name: Get tag name
        id: tag_name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: Release ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            password_manager.dmg
            password_manager_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
