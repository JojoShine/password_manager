name: Build and Release Flutter App

# 添加权限声明
permissions:
  contents: read  # 允许读取代码仓库

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  FLUTTER_VERSION: '3.35.4'

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不保留凭证
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS app
        run: flutter build macos --release
      
      - name: Create DMG package
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "Password Manager" \
            -srcfolder "password_manager.app" \
            -ov -format UDZO password_manager.dmg
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-macos
          path: build/macos/Build/Products/Release/password_manager.dmg
          retention-days: 30

  build-windows:
    name: Build Windows App
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不保留凭证
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop
      
      - name: Clean Windows build cache
        run: if (Test-Path build) { Remove-Item -Recurse -Force build }
      
      - name: Patch Flutter SDK to use VS 2022 generator
        shell: pwsh
        run: |
          # Flutter通过vswhere.exe检测VS版本，但某些环境下检测失败
          # 直接修补预编译snapshot中的生成器字符串，强制使用VS 2022
          $flutterRoot = (flutter --version | Select-String "Flutter at (.+)" | ForEach-Object { $_.Matches.Groups[1].Value })
          if (-not $flutterRoot) {
            $flutterBin = (Get-Command flutter).Source | Split-Path -Parent
            $flutterRoot = Split-Path $flutterBin -Parent
          }
          Write-Host "Flutter SDK: $flutterRoot"
          
          $snapshotPath = Join-Path $flutterRoot "bin\cache\flutter_tools.snapshot"
          if (Test-Path $snapshotPath) {
            $bytes = [System.IO.File]::ReadAllBytes($snapshotPath)
            $content = [System.Text.Encoding]::ASCII.GetString($bytes)
            $old = "Visual Studio 16 2019"
            $new = "Visual Studio 17 2022"
            $count = ([regex]::Matches($content, [regex]::Escape($old))).Count
            Write-Host "Found $count occurrences of '$old'"
            $content = $content.Replace($old, $new)
            $newBytes = [System.Text.Encoding]::ASCII.GetBytes($content)
            [System.IO.File]::WriteAllBytes($snapshotPath, $newBytes)
            Write-Host "Patched snapshot: replaced '$old' with '$new'"
          } else {
            Write-Host "Snapshot not found at $snapshotPath"
          }
      
      - name: Build Windows app
        run: flutter build windows --release
      
      - name: Create ZIP package
        uses: vimtor/action-zip@v1
        with:
          files: build/windows/x64/runner/Release/
          dest: password_manager_windows.zip
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-windows
          path: password_manager_windows.zip
          retention-days: 30

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write  # 需要写入权限来创建 Release
    
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: password-manager-macos
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: password-manager-windows
      
      - name: Get tag name
        id: tag_name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: Release ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            password_manager.dmg
            password_manager_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
