name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter version
        shell: pwsh
        run: |
          flutter --version
          $ver = (flutter --version | Select-String "Flutter (\S+)" | ForEach-Object { $_.Matches.Groups[1].Value })
          Write-Host "Flutter version: $ver"
      
      - name: Patch Flutter SDK for VS 2022
        shell: pwsh
        run: |
          $flutterBin = (Get-Command flutter).Source | Split-Path -Parent
          $flutterRoot = Split-Path $flutterBin -Parent
          Write-Host "Flutter SDK: $flutterRoot"
          
          # 诊断: vswhere输出
          $vswherePath = "${env:PROGRAMFILES(X86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswherePath) {
            Write-Host "=== vswhere output ==="
            & $vswherePath -format json -products * -utf8 -latest
          }
          
          # 修补Dart源码: 将default生成器从VS 2019改为VS 2022
          $vsFile = Join-Path $flutterRoot "packages\flutter_tools\lib\src\windows\visual_studio.dart"
          if (Test-Path $vsFile) {
            $content = [System.IO.File]::ReadAllText($vsFile, [System.Text.Encoding]::UTF8)
            $oldStr = "Visual Studio 16 2019"
            $count = ([regex]::Matches($content, [regex]::Escape($oldStr))).Count
            Write-Host "Source: found $count occurrences of '$oldStr'"
            if ($count -gt 0) {
              $content = $content.Replace($oldStr, "Visual Studio 17 2022")
              [System.IO.File]::WriteAllText($vsFile, $content, (New-Object System.Text.UTF8Encoding $false))
              Write-Host "Source patched OK"
            }
          }
          
          # 同时修补snapshot二进制(尝试UTF-8和UTF-16LE)
          $snapshotPath = Join-Path $flutterRoot "bin\cache\flutter_tools.snapshot"
          if (Test-Path $snapshotPath) {
            $bytes = [System.IO.File]::ReadAllBytes($snapshotPath)
            Write-Host "Snapshot size: $($bytes.Length) bytes"
            $patched = $false
            
            # UTF-8
            $oldB = [System.Text.Encoding]::UTF8.GetBytes("Visual Studio 16 2019")
            $newB = [System.Text.Encoding]::UTF8.GetBytes("Visual Studio 17 2022")
            for ($i = 0; $i -le $bytes.Length - $oldB.Length; $i++) {
              $m = $true
              for ($j = 0; $j -lt $oldB.Length; $j++) { if ($bytes[$i+$j] -ne $oldB[$j]) { $m=$false; break } }
              if ($m) {
                for ($j = 0; $j -lt $newB.Length; $j++) { $bytes[$i+$j] = $newB[$j] }
                Write-Host "Snapshot patched (UTF-8) at offset $i"
                $patched = $true; break
              }
            }
            
            # UTF-16LE
            if (-not $patched) {
              $oldB = [System.Text.Encoding]::Unicode.GetBytes("Visual Studio 16 2019")
              $newB = [System.Text.Encoding]::Unicode.GetBytes("Visual Studio 17 2022")
              for ($i = 0; $i -le $bytes.Length - $oldB.Length; $i++) {
                $m = $true
                for ($j = 0; $j -lt $oldB.Length; $j++) { if ($bytes[$i+$j] -ne $oldB[$j]) { $m=$false; break } }
                if ($m) {
                  for ($j = 0; $j -lt $newB.Length; $j++) { $bytes[$i+$j] = $newB[$j] }
                  Write-Host "Snapshot patched (UTF-16LE) at offset $i"
                  $patched = $true; break
                }
              }
            }
            
            if ($patched) {
              [System.IO.File]::WriteAllBytes($snapshotPath, $bytes)
              Write-Host "Snapshot written OK"
            } else {
              Write-Host "WARNING: string not found in snapshot"
            }
          }
          
          # 删除stamp强制重编译
          $stampPath = Join-Path $flutterRoot "bin\cache\flutter_tools.stamp"
          if (Test-Path $stampPath) { Remove-Item $stampPath -Force; Write-Host "Stamp deleted" }
      
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows app
        run: flutter build windows --release
      
      - name: Create Windows zip
        uses: vimtor/action-zip@v1
        with:
          files: build/windows/x64/runner/Release/
          dest: password_manager_windows.zip
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: password_manager_windows.zip
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS app
        run: flutter build macos --release
      
      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "Password Manager" \
            -srcfolder "password_manager.app" \
            -ov -format UDZO password_manager.dmg
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/password_manager.dmg
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
      
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
      
      - name: Get tag name
        id: tag_name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: Release ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            password_manager_windows.zip
            password_manager.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
