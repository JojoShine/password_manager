name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Flutter SDK (Source + Snapshot + Cache Clear)
        shell: pwsh
        run: |
          $flutterBin = (Get-Command flutter).Source | Split-Path -Parent
          $flutterRoot = Split-Path $flutterBin -Parent
          Write-Host "Flutter SDK: $flutterRoot"

          # 1. 修改源代码
          $vsFile = Join-Path $flutterRoot "packages\flutter_tools\lib\src\windows\visual_studio.dart"
          if (Test-Path $vsFile) {
            Write-Host "Patching source: $vsFile"
            $content = Get-Content $vsFile -Raw
            $content = $content -replace 'Visual Studio 16 2019', 'Visual Studio 17 2022'
            Set-Content $vsFile -Value $content -Encoding UTF8 -NoNewline
            Write-Host "✓ Source patched"
          }

          # 2. 修改 snapshot 二进制
          $snap = Join-Path $flutterRoot "bin\cache\flutter_tools.snapshot"
          if (Test-Path $snap) {
            Write-Host "Patching snapshot: $snap"
            $bytes = [System.IO.File]::ReadAllBytes($snap)

            # UTF-8 替换
            $oldUtf8 = [System.Text.Encoding]::UTF8.GetBytes("Visual Studio 16 2019")
            $newUtf8 = [System.Text.Encoding]::UTF8.GetBytes("Visual Studio 17 2022")

            for ($i = 0; $i -le $bytes.Length - $oldUtf8.Length; $i++) {
              $match = $true
              for ($j = 0; $j -lt $oldUtf8.Length; $j++) {
                if ($bytes[$i + $j] -ne $oldUtf8[$j]) { $match = $false; break }
              }
              if ($match) {
                for ($j = 0; $j -lt $newUtf8.Length; $j++) {
                  $bytes[$i + $j] = $newUtf8[$j]
                }
                Write-Host "✓ Snapshot patched (UTF-8)"
                break
              }
            }

            [System.IO.File]::WriteAllBytes($snap, $bytes)
          }

          # 3. 清除缓存
          $stamp = Join-Path $flutterRoot "bin\cache\flutter_tools.stamp"
          $dartCache = Join-Path $flutterRoot "bin\cache\dart-sdk\.dart_tool"
          if (Test-Path $stamp) { Remove-Item $stamp -Force; Write-Host "✓ Stamp deleted" }
          if (Test-Path $dartCache) { Remove-Item $dartCache -Recurse -Force -ErrorAction SilentlyContinue; Write-Host "✓ Dart cache cleared" }

          # 4. 清除 ephemeral 缓存
          if (Test-Path "windows\flutter\ephemeral") {
            Remove-Item "windows\flutter\ephemeral" -Recurse -Force -ErrorAction SilentlyContinue
            Write-Host "✓ Ephemeral cleared"
          }

          Write-Host "=== Patch complete ==="

      - name: Reconfigure Flutter
        run: |
          flutter clean
          flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create Windows installer
        run: |
          mkdir windows-release
          cp -r build/windows/x64/runner/Release/* windows-release/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Debug build output
        run: |
          echo "=== 检查构建输出 ==="
          echo "构建目录结构:"
          find build -type d 2>/dev/null | head -10 || echo "build 目录不存在"
          echo "查找 .app 文件:"
          find build -name "*.app" -type d 2>/dev/null || echo "未找到 .app 文件"

      - name: Create DMG
        run: |
          echo "=== 创建 DMG 文件 ==="

          # 查找 .app 文件
          APP_PATH=$(find build -name "*.app" -type d | head -1)

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到 app 文件: $APP_PATH"

            # 创建 DMG（使用英文名称）
            hdiutil create -volname "PasswordManager" -srcfolder "$APP_PATH" -ov -format UDZO "PasswordManager-macOS.dmg"

            if [ -f "PasswordManager-macOS.dmg" ]; then
              echo "DMG 文件创建成功!"
              ls -la PasswordManager-macOS.dmg
            else
              echo "DMG 文件创建失败!"
              exit 1
            fi
          else
            echo "错误: 未找到 .app 文件"
            echo "详细目录结构:"
            find build -type f | head -20
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: PasswordManager-macOS.dmg
