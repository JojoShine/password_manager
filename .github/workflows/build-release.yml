name: Build and Release Flutter App

# 添加权限声明
permissions:
  contents: read  # 允许读取代码仓库

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  FLUTTER_VERSION: '3.35.4'

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不保留凭证
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS app
        run: flutter build macos --release
      
      - name: Create DMG package
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "Password Manager" \
            -srcfolder "password_manager.app" \
            -ov -format UDZO password_manager.dmg
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-macos
          path: build/macos/Build/Products/Release/password_manager.dmg
          retention-days: 30

  build-windows:
    name: Build Windows App
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不保留凭证
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop
      
      - name: Clean Windows build cache
        run: if (Test-Path build) { Remove-Item -Recurse -Force build }
      
      - name: Patch Flutter SDK to use VS 2022 generator
        shell: pwsh
        run: |
          # 获取Flutter SDK路径
          $flutterBin = (Get-Command flutter).Source | Split-Path -Parent
          $flutterRoot = Split-Path $flutterBin -Parent
          Write-Host "Flutter SDK: $flutterRoot"
          
          # 诊断：查看vswhere检测到什么
          $vswherePath = "${env:PROGRAMFILES(X86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswherePath) {
            Write-Host "=== vswhere output ==="
            & $vswherePath -format json -products * -utf8 -latest | Write-Host
          }
          
          # 修补Dart源码中的VS版本检测逻辑
          $vsFile = Join-Path $flutterRoot "packages\flutter_tools\lib\src\windows\visual_studio.dart"
          if (Test-Path $vsFile) {
            $content = Get-Content $vsFile -Raw
            # 将cmakeGenerator的switch逻辑改为始终返回VS 2022
            $content = $content.Replace(
              "17 => 'Visual Studio 17 2022',",
              "17 => 'Visual Studio 17 2022',"
            )
            # 将default分支从VS 2019改为VS 2022
            $content = $content.Replace(
              "_ => 'Visual Studio 16 2019',",
              "_ => 'Visual Studio 17 2022',"
            )
            Set-Content $vsFile -Value $content -NoNewline
            Write-Host "Patched visual_studio.dart source"
          } else {
            Write-Host "visual_studio.dart not found at $vsFile"
          }
          
          # 删除stamp文件，强制Flutter从源码重新编译snapshot
          $stampPath = Join-Path $flutterRoot "bin\cache\flutter_tools.stamp"
          $snapshotPath = Join-Path $flutterRoot "bin\cache\flutter_tools.snapshot"
          if (Test-Path $stampPath) {
            Remove-Item $stampPath -Force
            Write-Host "Deleted flutter_tools.stamp - snapshot will be recompiled"
          }
          if (Test-Path $snapshotPath) {
            Remove-Item $snapshotPath -Force
            Write-Host "Deleted old flutter_tools.snapshot"
          }
      
      - name: Build Windows app
        run: flutter build windows --release
      
      - name: Create ZIP package
        uses: vimtor/action-zip@v1
        with:
          files: build/windows/x64/runner/Release/
          dest: password_manager_windows.zip
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-windows
          path: password_manager_windows.zip
          retention-days: 30

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write  # 需要写入权限来创建 Release
    
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: password-manager-macos
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: password-manager-windows
      
      - name: Get tag name
        id: tag_name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: Release ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            password_manager.dmg
            password_manager_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
