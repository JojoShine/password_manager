name: Build and Release Flutter App

# 添加权限声明
permissions:
  contents: read  # 允许读取代码仓库

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  FLUTTER_VERSION: '3.35.4'

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不保留凭证
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS app
        run: flutter build macos --release
      
      - name: Create DMG package
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "Password Manager" \
            -srcfolder "password_manager.app" \
            -ov -format UDZO password_manager.dmg
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-macos
          path: build/macos/Build/Products/Release/password_manager.dmg
          retention-days: 30

  build-windows:
    name: Build Windows App
    runs-on: windows-2022
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 不保留凭证
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop
      
      - name: Clean Windows build cache
        run: if (Test-Path build) { Remove-Item -Recurse -Force build }
      
      - name: Create cmake wrapper for VS 2022
        shell: pwsh
        run: |
          # 找到真实的 cmake.exe
          $cmakePath = (Get-Command cmake).Source
          $cmakeDir = Split-Path $cmakePath -Parent
          Write-Host "cmake location: $cmakePath"
          
          # 创建wrapper目录
          $wrapperDir = "C:\cmake-wrapper"
          New-Item -ItemType Directory -Force -Path $wrapperDir | Out-Null
          
          # 将真实cmake复制到wrapper目录并重命名
          Copy-Item $cmakePath "$wrapperDir\cmake-real.exe"
          
          # 创建wrapper脚本，替换VS 2019为VS 2022
          $wrapperContent = "@echo off`r`nsetlocal EnableDelayedExpansion`r`nset `"ARGS=%*`"`r`nset `"ARGS=!ARGS:Visual Studio 16 2019=Visual Studio 17 2022!`"`r`n`"%~dp0cmake-real.exe`" %ARGS%"
          Set-Content -Path "$wrapperDir\cmake.bat" -Value $wrapperContent -Encoding ASCII
          
          # 将wrapper目录加到PATH最前面
          "CMAKE_WRAPPER=$wrapperDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "cmake wrapper created at $wrapperDir"
      
      - name: Build Windows app
        run: |
          $env:PATH = "${{ env.CMAKE_WRAPPER }};" + $env:PATH
          flutter build windows --release
      
      - name: Create ZIP package
        uses: vimtor/action-zip@v1
        with:
          files: build/windows/x64/runner/Release/
          dest: password_manager_windows.zip
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-windows
          path: password_manager_windows.zip
          retention-days: 30

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write  # 需要写入权限来创建 Release
    
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: password-manager-macos
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: password-manager-windows
      
      - name: Get tag name
        id: tag_name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: Release ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            password_manager.dmg
            password_manager_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
