name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Create CMake wrapper to fix generator
        shell: pwsh
        run: |
          # 创建 cmake 包装脚本目录
          $wrapperDir = "$env:TEMP\cmake_wrapper"
          New-Item -ItemType Directory -Path $wrapperDir -Force | Out-Null

          # 创建 cmake.bat 包装脚本，自动添加 -G "Visual Studio 17 2022"
          $cmakeBat = Join-Path $wrapperDir "cmake.bat"
          @'
          @echo off
          REM 拦截 cmake 命令，强制使用 Visual Studio 17 2022
          setlocal enabledelayedexpansion

          set "args=%*"
          REM 检查是否已经有 -G 参数
          if not "!args:-G=!" == "!args!" (
            REM 已有 -G 参数，直接传递
            "%CMAKE_ORIGINAL%" !args!
          ) else (
            REM 没有 -G 参数，添加生成器
            "%CMAKE_ORIGINAL%" -G "Visual Studio 17 2022" !args!
          )
          endlocal
'@ | Set-Content -Path $cmakeBat -Encoding ASCII

          Write-Host "CMake wrapper created at: $cmakeBat"
          Write-Host "Content:"
          Get-Content $cmakeBat

          # 设置环境变量
          $cmakeOriginal = (Get-Command cmake).Source
          Write-Host "Original cmake: $cmakeOriginal"

          echo "CMAKE_ORIGINAL=$cmakeOriginal" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PATH=$wrapperDir;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "PATH updated to prioritize wrapper"

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create Windows installer
        run: |
          mkdir windows-release
          cp -r build/windows/x64/runner/Release/* windows-release/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Debug build output
        run: |
          echo "=== 检查构建输出 ==="
          echo "构建目录结构:"
          find build -type d 2>/dev/null | head -10 || echo "build 目录不存在"
          echo "查找 .app 文件:"
          find build -name "*.app" -type d 2>/dev/null || echo "未找到 .app 文件"

      - name: Create DMG
        run: |
          echo "=== 创建 DMG 文件 ==="

          # 查找 .app 文件
          APP_PATH=$(find build -name "*.app" -type d | head -1)

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到 app 文件: $APP_PATH"

            # 创建 DMG（使用英文名称）
            hdiutil create -volname "PasswordManager" -srcfolder "$APP_PATH" -ov -format UDZO "PasswordManager-macOS.dmg"

            if [ -f "PasswordManager-macOS.dmg" ]; then
              echo "DMG 文件创建成功!"
              ls -la PasswordManager-macOS.dmg
            else
              echo "DMG 文件创建失败!"
              exit 1
            fi
          else
            echo "错误: 未找到 .app 文件"
            echo "详细目录结构:"
            find build -type f | head -20
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: PasswordManager-macOS.dmg
