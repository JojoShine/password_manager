name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Setup CMake Generator
        shell: pwsh
        run: |
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "CMAKE_GENERATOR set to: Visual Studio 17 2022"

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Flutter generated config
        shell: pwsh
        run: |
          $configFile = "windows\flutter\ephemeral\generated_config.cmake"
          if (Test-Path $configFile) {
            Write-Host "Patching: $configFile"
            $content = Get-Content $configFile -Raw -Encoding UTF8
            $oldContent = $content

            # 替换 Visual Studio 16 2019 为 Visual Studio 17 2022
            $content = $content -replace '"Visual Studio 16 2019"', '"Visual Studio 17 2022"'

            if ($content -ne $oldContent) {
              Set-Content $configFile -Value $content -Encoding UTF8 -NoNewline
              Write-Host "✓ Config patched successfully"
              Write-Host "Content preview:"
              Get-Content $configFile -Raw | Select-String "Visual Studio" -Context 2
            } else {
              Write-Host "No match found, showing config content:"
              Get-Content $configFile | Select-String -Pattern "Visual Studio|CMAKE|GENERATOR"
            }
          } else {
            Write-Host "Config file not found at: $configFile"
          }

      - name: Build Windows app
        run: flutter build windows --release -v

      - name: Create Windows zip
        uses: vimtor/action-zip@v1
        with:
          files: build/windows/x64/runner/Release/
          dest: password_manager_windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: password_manager_windows.zip
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "Password Manager" \
            -srcfolder "password_manager.app" \
            -ov -format UDZO password_manager.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/password_manager.dmg
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release

      - name: Get tag name
        id: tag_name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: Release ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            password_manager_windows.zip
            password_manager.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
