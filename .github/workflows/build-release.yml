name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      # 必须在任何flutter命令之前修补！
      - name: Patch Flutter SDK for VS 2022 (MUST BE FIRST)
        shell: pwsh
        run: |
          $flutterBin = (Get-Command flutter).Source | Split-Path -Parent
          $flutterRoot = Split-Path $flutterBin -Parent
          Write-Host "Flutter SDK: $flutterRoot"
          
          # 诊断: vswhere
          $vswhere = "${env:PROGRAMFILES(X86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            Write-Host "=== vswhere ==="
            & $vswhere -format json -products * -utf8 -latest
          }
          
          # 1. 修补源码
          $vsFile = Join-Path $flutterRoot "packages\flutter_tools\lib\src\windows\visual_studio.dart"
          if (Test-Path $vsFile) {
            $content = [System.IO.File]::ReadAllText($vsFile, [System.Text.Encoding]::UTF8)
            $old = "Visual Studio 16 2019"
            $count = ([regex]::Matches($content, [regex]::Escape($old))).Count
            Write-Host "Source: found '$old' $count times"
            if ($count -gt 0) {
              $content = $content.Replace($old, "Visual Studio 17 2022")
              [System.IO.File]::WriteAllText($vsFile, $content, (New-Object System.Text.UTF8Encoding $false))
              # 验证写入
              $verify = [System.IO.File]::ReadAllText($vsFile, [System.Text.Encoding]::UTF8)
              $newCount = ([regex]::Matches($verify, "Visual Studio 17 2022")).Count
              Write-Host "Source patched. Verify: 'Visual Studio 17 2022' appears $newCount times"
            } else {
              Write-Host "ERROR: String not found in source!"
              # 打印相关行帮助诊断
              $lines = Get-Content $vsFile
              for ($i = 0; $i -lt $lines.Count; $i++) {
                if ($lines[$i] -match "cmakeGenerator|Visual Studio|_majorVersion") {
                  Write-Host "Line $($i+1): $($lines[$i])"
                }
              }
            }
          } else {
            Write-Host "ERROR: visual_studio.dart not found!"
          }
          
          # 2. 修补snapshot二进制
          $snap = Join-Path $flutterRoot "bin\cache\flutter_tools.snapshot"
          if (Test-Path $snap) {
            $bytes = [System.IO.File]::ReadAllBytes($snap)
            Write-Host "Snapshot: $($bytes.Length) bytes"
            $ok = $false
            
            # UTF-8
            $oB = [System.Text.Encoding]::UTF8.GetBytes("Visual Studio 16 2019")
            $nB = [System.Text.Encoding]::UTF8.GetBytes("Visual Studio 17 2022")
            for ($i = 0; $i -le $bytes.Length - $oB.Length; $i++) {
              $m = $true; for ($j = 0; $j -lt $oB.Length; $j++) { if ($bytes[$i+$j] -ne $oB[$j]) { $m=$false; break } }
              if ($m) { for ($j = 0; $j -lt $nB.Length; $j++) { $bytes[$i+$j] = $nB[$j] }; Write-Host "Snapshot patched UTF-8 at $i"; $ok=$true; break }
            }
            # UTF-16LE
            if (-not $ok) {
              $oB = [System.Text.Encoding]::Unicode.GetBytes("Visual Studio 16 2019")
              $nB = [System.Text.Encoding]::Unicode.GetBytes("Visual Studio 17 2022")
              for ($i = 0; $i -le $bytes.Length - $oB.Length; $i++) {
                $m = $true; for ($j = 0; $j -lt $oB.Length; $j++) { if ($bytes[$i+$j] -ne $oB[$j]) { $m=$false; break } }
                if ($m) { for ($j = 0; $j -lt $nB.Length; $j++) { $bytes[$i+$j] = $nB[$j] }; Write-Host "Snapshot patched UTF-16LE at $i"; $ok=$true; break }
              }
            }
            if ($ok) { [System.IO.File]::WriteAllBytes($snap, $bytes); Write-Host "Snapshot saved" }
            else { Write-Host "WARNING: string not found in snapshot binary" }
          }
          
          # 3. 删除stamp (在源码已修补后)
          $stamp = Join-Path $flutterRoot "bin\cache\flutter_tools.stamp"
          if (Test-Path $stamp) { Remove-Item $stamp -Force; Write-Host "Stamp deleted" }
          
          Write-Host "=== Patch complete ==="
      
      # 以下才开始运行flutter命令
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows app
        run: flutter build windows --release -v
      
      - name: Create Windows zip
        uses: vimtor/action-zip@v1
        with:
          files: build/windows/x64/runner/Release/
          dest: password_manager_windows.zip
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: password_manager_windows.zip
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS app
        run: flutter build macos --release
      
      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          hdiutil create -volname "Password Manager" \
            -srcfolder "password_manager.app" \
            -ov -format UDZO password_manager.dmg
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/password_manager.dmg
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
      
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
      
      - name: Get tag name
        id: tag_name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: Release ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            password_manager_windows.zip
            password_manager.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
